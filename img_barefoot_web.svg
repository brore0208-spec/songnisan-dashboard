<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e6c9"/>
      <stop offset="100%" stop-color="#e8f5e9"/>
    </linearGradient>
    <filter id="ds">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="920" fill="url(#sky)" rx="16"/>

  <!-- 산 실루엣 -->
  <polygon points="0,160 80,80 160,120 260,50 380,100 500,40 600,90 720,60 800,110 800,200 0,200" fill="#66bb6a" opacity="0.25"/>
  <polygon points="0,200 50,140 150,170 250,110 370,150 480,100 580,140 700,110 800,160 800,220 0,220" fill="#4caf50" opacity="0.2"/>

  <!-- 나무 장식 -->
  <g opacity="0.35">
    <polygon points="50,195 42,215 58,215" fill="#2e7d32"/><rect x="48" y="215" width="4" height="8" fill="#5d4037"/>
    <polygon points="120,185 112,205 128,205" fill="#388e3c"/><rect x="118" y="205" width="4" height="8" fill="#5d4037"/>
    <polygon points="680,190 672,210 688,210" fill="#2e7d32"/><rect x="678" y="210" width="4" height="8" fill="#5d4037"/>
    <polygon points="750,180 742,200 758,200" fill="#388e3c"/><rect x="748" y="200" width="4" height="8" fill="#5d4037"/>
    <polygon points="400,195 392,215 408,215" fill="#2e7d32"/><rect x="398" y="215" width="4" height="8" fill="#5d4037"/>
  </g>

  <!-- ====== 타이틀 ====== -->
  <rect x="30" y="16" width="740" height="56" rx="14" fill="#2e7d32" filter="url(#ds)"/>
  <text x="400" y="38" text-anchor="middle" fill="white" font-size="22" font-weight="800">속리산 포레스트 주변 맨발걷기 추천 지도</text>
  <rect x="280" y="48" width="240" height="20" rx="10" fill="#1b5e20"/>
  <text x="400" y="62" text-anchor="middle" fill="#a5d6a7" font-size="12" font-weight="600">검증된 추천 코스 5선</text>

  <!-- ====== 중앙 건물: 속리산 포레스트 ====== -->
  <g transform="translate(400,470)">
    <ellipse cx="0" cy="25" rx="65" ry="12" fill="#33691e" opacity="0.12"/>
    <rect x="-40" y="-28" width="80" height="45" rx="4" fill="#6d4c41" filter="url(#ds)"/>
    <polygon points="-50,-28 0,-52 50,-28" fill="#8d6e63"/>
    <rect x="-28" y="-16" width="12" height="11" rx="1.5" fill="#ffe082"/>
    <rect x="-8" y="-16" width="12" height="11" rx="1.5" fill="#ffe082"/>
    <rect x="16" y="-16" width="12" height="11" rx="1.5" fill="#ffe082"/>
    <rect x="-5" y="0" width="10" height="17" rx="1.5" fill="#3e2723"/>
    <text x="0" y="45" text-anchor="middle" fill="#1b5e20" font-size="14" font-weight="800">속리산 포레스트</text>
    <text x="0" y="58" text-anchor="middle" fill="#558b2f" font-size="10">(출발지)</text>
  </g>

  <!-- ====== 점선 경로 ====== -->
  <!-- 코스1: 왼쪽 위 -->
  <path d="M355,455 C300,410 230,350 165,310" stroke="#e65100" stroke-width="2.5" stroke-dasharray="7,4" fill="none" opacity="0.6"/>
  <!-- 코스2: 오른쪽 위 -->
  <path d="M445,455 C510,410 570,350 640,305" stroke="#2e7d32" stroke-width="2.5" stroke-dasharray="7,4" fill="none" opacity="0.6"/>
  <!-- 코스3: 왼쪽 -->
  <path d="M345,475 C280,480 210,490 130,510" stroke="#43a047" stroke-width="2.5" stroke-dasharray="7,4" fill="none" opacity="0.6"/>
  <!-- 코스4: 오른쪽 -->
  <path d="M455,480 C520,490 590,510 660,530" stroke="#66bb6a" stroke-width="2.5" stroke-dasharray="7,4" fill="none" opacity="0.6"/>
  <!-- 코스5: 아래 -->
  <path d="M400,530 C400,570 400,620 400,660" stroke="#81c784" stroke-width="2.5" stroke-dasharray="7,4" fill="none" opacity="0.6"/>

  <!-- ====== 코스 1: 이평소공원 황톳길 (왼쪽 위) ====== -->
  <g transform="translate(140,230)">
    <rect x="-120" y="-20" width="240" height="108" rx="12" fill="white" filter="url(#ds)"/>
    <rect x="-120" y="-20" width="240" height="4" rx="2" fill="#e65100"/>
    <circle cx="-95" cy="8" r="16" fill="#e65100"/>
    <text x="-95" y="13" text-anchor="middle" fill="white" font-size="14" font-weight="800">1</text>
    <text x="-72" y="2" fill="#1b5e20" font-size="15" font-weight="800">이평소공원 황톳길</text>
    <rect x="75" y="-10" width="42" height="20" rx="10" fill="#e65100"/>
    <text x="96" y="5" text-anchor="middle" fill="white" font-size="11" font-weight="700">BEST</text>
    <line x1="-108" y1="24" x2="108" y2="24" stroke="#f5f5f5" stroke-width="1"/>
    <text x="-108" y="42" fill="#333" font-size="13" font-weight="600">250m  /  10~15분</text>
    <text x="-108" y="60" fill="#666" font-size="11">전용 맨발걷기 황토길 + 세족장 완비</text>
    <text x="-108" y="78" fill="#888" font-size="10">보은읍 이평소공원 (차로 약 20분)</text>
  </g>

  <!-- ====== 코스 2: 솔향공원 (오른쪽 위) ====== -->
  <g transform="translate(660,230)">
    <rect x="-120" y="-20" width="240" height="108" rx="12" fill="white" filter="url(#ds)"/>
    <rect x="-120" y="-20" width="240" height="4" rx="2" fill="#2e7d32"/>
    <circle cx="-95" cy="8" r="16" fill="#2e7d32"/>
    <text x="-95" y="13" text-anchor="middle" fill="white" font-size="14" font-weight="800">2</text>
    <text x="-72" y="2" fill="#1b5e20" font-size="15" font-weight="800">솔향공원 소나무 숲길</text>
    <line x1="-108" y1="24" x2="108" y2="24" stroke="#f5f5f5" stroke-width="1"/>
    <text x="-108" y="42" fill="#333" font-size="13" font-weight="600">1~2km  /  30분~1시간</text>
    <text x="-108" y="60" fill="#666" font-size="11">소나무숲 평지 흙길 / 무료 입장</text>
    <text x="-108" y="78" fill="#888" font-size="10">속리산면 만수리 솔향공원</text>
  </g>

  <!-- ====== 코스 3: 오리숲길 (왼쪽) ====== -->
  <g transform="translate(105,535)">
    <rect x="-90" y="-20" width="210" height="108" rx="12" fill="white" filter="url(#ds)"/>
    <rect x="-90" y="-20" width="210" height="4" rx="2" fill="#43a047"/>
    <circle cx="-65" cy="8" r="16" fill="#43a047"/>
    <text x="-65" y="13" text-anchor="middle" fill="white" font-size="14" font-weight="800">3</text>
    <text x="-42" y="2" fill="#1b5e20" font-size="15" font-weight="800">오리숲길</text>
    <text x="42" y="2" fill="#888" font-size="11">(후반 흙길)</text>
    <line x1="-78" y1="24" x2="108" y2="24" stroke="#f5f5f5" stroke-width="1"/>
    <text x="-78" y="42" fill="#333" font-size="13" font-weight="600">약 1km  /  약 20분</text>
    <text x="-78" y="60" fill="#666" font-size="11">소나무 숲터널 / 후반 흙길 구간</text>
    <text x="-78" y="78" fill="#e65100" font-size="10" font-weight="600">* 초반 포장구간은 신발 착용</text>
  </g>

  <!-- ====== 코스 4: 말티재 (오른쪽) ====== -->
  <g transform="translate(685,555)">
    <rect x="-110" y="-20" width="220" height="108" rx="12" fill="white" filter="url(#ds)"/>
    <rect x="-110" y="-20" width="220" height="4" rx="2" fill="#66bb6a"/>
    <circle cx="-85" cy="8" r="16" fill="#66bb6a"/>
    <text x="-85" y="13" text-anchor="middle" fill="white" font-size="14" font-weight="800">4</text>
    <text x="-62" y="2" fill="#1b5e20" font-size="15" font-weight="800">말티재 자연휴양림</text>
    <line x1="-98" y1="24" x2="98" y2="24" stroke="#f5f5f5" stroke-width="1"/>
    <text x="-98" y="42" fill="#333" font-size="13" font-weight="600">2.5km  /  약 1시간</text>
    <text x="-98" y="60" fill="#666" font-size="11">낙엽+흙 숲길 / 피톤치드 삼림욕</text>
    <text x="-98" y="78" fill="#888" font-size="10">장안면 속리산로 256</text>
  </g>

  <!-- ====== 코스 5: 정이품송~비룡저수지 (아래 중앙) ====== -->
  <g transform="translate(400,700)">
    <rect x="-145" y="-20" width="290" height="108" rx="12" fill="white" filter="url(#ds)"/>
    <rect x="-145" y="-20" width="290" height="4" rx="2" fill="#81c784"/>
    <circle cx="-120" cy="8" r="16" fill="#81c784"/>
    <text x="-120" y="13" text-anchor="middle" fill="white" font-size="14" font-weight="800">5</text>
    <text x="-97" y="2" fill="#1b5e20" font-size="15" font-weight="800">정이품송 ~ 비룡저수지</text>
    <line x1="-133" y1="24" x2="133" y2="24" stroke="#f5f5f5" stroke-width="1"/>
    <text x="-133" y="42" fill="#333" font-size="13" font-weight="600">4.6km  /  약 1시간</text>
    <text x="-133" y="60" fill="#666" font-size="11">저지대 평탄 흙길 / 수월한 난이도</text>
    <text x="-133" y="78" fill="#888" font-size="10">정이품송 ~ 비룡저수지 수평탐방로</text>
  </g>

  <!-- ====== 안전 수칙 (하단) ====== -->
  <rect x="30" y="825" width="740" height="72" rx="12" fill="white" opacity="0.9" filter="url(#ds)"/>
  <rect x="30" y="825" width="740" height="4" rx="2" fill="#f9a825"/>
  <text x="56" y="850" fill="#f57f17" font-size="13" font-weight="800">안전 수칙</text>
  <text x="56" y="870" fill="#555" font-size="11">처음엔 10~15분부터 시작   |   날카로운 돌·나뭇가지 주의   |   신발 꼭 챙기기   |   걷기 후 발 씻고 보습</text>
  <text x="56" y="887" fill="#555" font-size="11">당뇨 등 족부질환 시 의사 상담   |   우천 시 황토길·흙길 상태 확인 후 이용   |   이평소공원에는 세족장 완비</text>

  <!-- ====== 하단 브랜딩 ====== -->
  <rect x="230" y="902" width="340" height="14" rx="7" fill="#2e7d32" opacity="0.7"/>
  <text x="400" y="913" text-anchor="middle" fill="white" font-size="9">2026 대구교회 여름집회  |  속리산 포레스트 기준 차량 이동 후 이용</text>
</svg>