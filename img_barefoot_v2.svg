    <text x="-155" y="60" fill="#444" font-size="12">무료 입장. 맨발걷기에 적합합니다.</text>
    <text x="-155" y="78" fill="#2e86c1" font-size="11">위치: 보은군 속리산면 만수리 솔향공원</text>
