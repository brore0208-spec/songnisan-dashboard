    <text x="-155" y="42" fill="#444" font-size="12">폭 2m 황토 흙길 + 세족장 + 황토체험장 + 퍼걸러 완비</text>
    <text x="-155" y="60" fill="#444" font-size="12">가장 안전하고 확실한 맨발걷기 장소!</text>
    <!-- 위치 -->
