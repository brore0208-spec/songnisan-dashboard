<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" font-family="'Malgun Gothic', sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="40%" stop-color="#b8e6b8"/>
      <stop offset="100%" stop-color="#6aad6a"/>
    </linearGradient>
    <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8c4a"/>
      <stop offset="100%" stop-color="#3d7a3d"/>
    </linearGradient>
    <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a9a5a"/>
      <stop offset="100%" stop-color="#4a8a4a"/>
    </linearGradient>
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </linearGradient>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 배경: 하늘 + 녹지 -->
  <rect width="800" height="1000" fill="url(#sky)" rx="16"/>

  <!-- 구름 -->
  <g fill="white" opacity="0.6">
    <ellipse cx="120" cy="50" rx="50" ry="18"/>
    <ellipse cx="155" cy="42" rx="35" ry="14"/>
    <ellipse cx="600" cy="35" rx="45" ry="16"/>
    <ellipse cx="640" cy="28" rx="30" ry="12"/>
    <ellipse cx="380" cy="60" rx="40" ry="14"/>
  </g>

  <!-- 원경 산 (뒤쪽) -->
  <polygon points="0,250 100,120 200,180 320,90 440,160 560,100 680,170 800,130 800,300 0,300" fill="url(#mtn1)" opacity="0.5"/>
  <polygon points="0,300 60,200 180,240 280,160 400,220 520,150 650,230 750,180 800,220 800,350 0,350" fill="url(#mtn2)" opacity="0.6"/>

  <!-- 근경 녹지 -->
  <ellipse cx="400" cy="500" rx="500" ry="300" fill="#5a9e5a" opacity="0.3"/>
  <rect x="0" y="400" width="800" height="600" fill="#6aad6a" opacity="0.4" rx="0"/>

  <!-- 흩뿌린 나무들 (배경) -->
  <g opacity="0.5">
    <!-- 왼쪽 숲 -->
    <polygon points="80,340 70,370 90,370" fill="#2d7a2d"/>
    <polygon points="80,350 66,380 94,380" fill="#3d8a3d"/>
    <rect x="77" y="380" width="6" height="12" fill="#5c3a1e"/>
    <polygon points="140,320 130,350 150,350" fill="#2d7a2d"/>
    <polygon points="140,330 126,360 154,360" fill="#3d8a3d"/>
    <rect x="137" y="360" width="6" height="12" fill="#5c3a1e"/>
    <!-- 오른쪽 숲 -->
    <polygon points="660,330 650,360 670,360" fill="#2d7a2d"/>
    <polygon points="660,340 646,370 674,370" fill="#3d8a3d"/>
    <rect x="657" y="370" width="6" height="12" fill="#5c3a1e"/>
    <polygon points="720,350 710,380 730,380" fill="#2d7a2d"/>
    <polygon points="720,360 706,390 734,390" fill="#3d8a3d"/>
    <rect x="717" y="390" width="6" height="12" fill="#5c3a1e"/>
    <!-- 중앙 하단 -->
    <polygon points="350,680 340,710 360,710" fill="#2d7a2d"/>
    <polygon points="350,690 336,720 364,720" fill="#3d8a3d"/>
    <rect x="347" y="720" width="6" height="10" fill="#5c3a1e"/>
    <polygon points="460,690 450,720 470,720" fill="#2d7a2d"/>
    <polygon points="460,700 446,730 474,730" fill="#3d8a3d"/>
    <rect x="457" y="730" width="6" height="10" fill="#5c3a1e"/>
  </g>

  <!-- 추가 나무들 -->
  <g opacity="0.45">
    <polygon points="230,380 220,410 240,410" fill="#2a752a"/>
    <rect x="227" y="410" width="6" height="10" fill="#5c3a1e"/>
    <polygon points="560,370 550,400 570,400" fill="#2a752a"/>
    <rect x="557" y="400" width="6" height="10" fill="#5c3a1e"/>
    <polygon points="180,650 170,680 190,680" fill="#2a752a"/>
    <rect x="177" y="680" width="6" height="10" fill="#5c3a1e"/>
    <polygon points="620,660 610,690 630,690" fill="#2a752a"/>
    <rect x="617" y="690" width="6" height="10" fill="#5c3a1e"/>
  </g>

  <!-- ====== 중앙: 속리산 포레스트 건물 ====== -->
  <g transform="translate(400,470)">
    <!-- 건물 본체 -->
    <rect x="-55" y="-35" width="110" height="55" rx="6" fill="url(#building)" filter="url(#ds)"/>
    <!-- 지붕 -->
    <polygon points="-65,-35 0,-65 65,-35" fill="#a0522d"/>
    <polygon points="-65,-35 0,-65 65,-35" fill="white" opacity="0.1"/>
    <!-- 창문 -->
    <rect x="-35" y="-20" width="16" height="16" rx="2" fill="#ffe082"/>
    <rect x="-8" y="-20" width="16" height="16" rx="2" fill="#ffe082"/>
    <rect x="19" y="-20" width="16" height="16" rx="2" fill="#ffe082"/>
    <!-- 문 -->
    <rect x="-7" y="0" width="14" height="20" rx="2" fill="#4e2a0a"/>
    <!-- 라벨 -->
    <text x="0" y="40" text-anchor="middle" fill="#1b5e20" font-size="14" font-weight="700">속리산 포레스트</text>
    <text x="0" y="54" text-anchor="middle" fill="#2e7d32" font-size="10">(숙소)</text>
  </g>

  <!-- ====== 점선 경로들 + 코스 라벨 ====== -->

  <!-- 코스1: 이평소공원 황톳길 - 왼쪽 아래 방향 -->
  <path d="M345,480 C280,500 220,530 150,580" stroke="#e65100" stroke-width="3" stroke-dasharray="8,5" fill="none" opacity="0.7"/>
  <!-- 발자국 아이콘 -->
  <circle cx="250" cy="510" r="5" fill="#e65100" opacity="0.4"/>
  <circle cx="220" cy="530" r="4" fill="#e65100" opacity="0.3"/>
  <circle cx="190" cy="555" r="5" fill="#e65100" opacity="0.4"/>

  <!-- 코스1 라벨 박스 -->
  <g transform="translate(120,600)">
    <rect x="-95" y="-35" width="210" height="85" rx="12" fill="white" filter="url(#ds)" opacity="0.95"/>
    <rect x="-95" y="-35" width="210" height="5" rx="2" fill="#e65100"/>
    <circle cx="-70" cy="-8" r="14" fill="#e65100"/>
    <text x="-70" y="-3" text-anchor="middle" fill="white" font-size="13" font-weight="700">1</text>
    <text x="-50" y="-12" fill="#1b5e20" font-size="13" font-weight="700">이평소공원 황톳길</text>
    <text x="-50" y="3" fill="#e65100" font-size="11" font-weight="700">BEST</text>
    <text x="-80" y="20" fill="#555" font-size="10">250m / 10~15분 / 전용코스</text>
    <text x="-80" y="35" fill="#888" font-size="9">황토흙길 + 세족장 완비</text>
    <!-- 황토 아이콘 -->
    <rect x="75" y="-5" width="30" height="18" rx="9" fill="#fff3e0"/>
    <text x="90" y="9" text-anchor="middle" fill="#e65100" font-size="8" font-weight="600">황토</text>
  </g>

  <!-- 코스2: 솔향공원 - 오른쪽 위 방향 -->
  <path d="M455,460 C520,440 580,410 650,380" stroke="#388e3c" stroke-width="3" stroke-dasharray="8,5" fill="none" opacity="0.7"/>
  <circle cx="520" cy="440" r="5" fill="#388e3c" opacity="0.4"/>
  <circle cx="580" cy="415" r="4" fill="#388e3c" opacity="0.3"/>
  <circle cx="620" cy="395" r="5" fill="#388e3c" opacity="0.4"/>

  <!-- 코스2 라벨 박스 -->
  <g transform="translate(680,355)">
    <rect x="-100" y="-35" width="200" height="80" rx="12" fill="white" filter="url(#ds)" opacity="0.95"/>
    <rect x="-100" y="-35" width="200" height="5" rx="2" fill="#388e3c"/>
    <circle cx="-75" cy="-8" r="14" fill="#388e3c"/>
    <text x="-75" y="-3" text-anchor="middle" fill="white" font-size="13" font-weight="700">2</text>
    <text x="-55" y="-12" fill="#1b5e20" font-size="13" font-weight="700">솔향공원 숲길</text>
    <text x="-85" y="8" fill="#555" font-size="10">1~2km / 30분~1시간</text>
    <text x="-85" y="23" fill="#888" font-size="9">소나무숲 평지 흙길 / 무료</text>
    <!-- 소나무 미니 아이콘 -->
    <polygon points="72,-10 65,5 79,5" fill="#4caf50" opacity="0.6"/>
    <rect x="70" y="5" width="4" height="7" fill="#5c3a1e" opacity="0.6"/>
  </g>

  <!-- 코스3: 오리숲길 - 왼쪽 위 방향 -->
  <path d="M355,450 C290,420 220,400 140,390" stroke="#43a047" stroke-width="3" stroke-dasharray="8,5" fill="none" opacity="0.7"/>
  <circle cx="290" cy="420" r="5" fill="#43a047" opacity="0.4"/>
  <circle cx="220" cy="405" r="4" fill="#43a047" opacity="0.3"/>
  <circle cx="170" cy="395" r="5" fill="#43a047" opacity="0.4"/>

  <!-- 코스3 라벨 박스 -->
  <g transform="translate(110,380)">
    <rect x="-90" y="-35" width="200" height="80" rx="12" fill="white" filter="url(#ds)" opacity="0.95"/>
    <rect x="-90" y="-35" width="200" height="5" rx="2" fill="#43a047"/>
    <circle cx="-65" cy="-8" r="14" fill="#43a047"/>
    <text x="-65" y="-3" text-anchor="middle" fill="white" font-size="13" font-weight="700">3</text>
    <text x="-45" y="-12" fill="#1b5e20" font-size="13" font-weight="700">오리숲길 (후반)</text>
    <text x="-75" y="8" fill="#555" font-size="10">흙길 약 1km / 20분</text>
    <text x="-75" y="23" fill="#888" font-size="9">소나무 숲터널 / 후반 흙길</text>
    <rect x="72" y="-5" width="30" height="18" rx="9" fill="#fff9c4"/>
    <text x="87" y="9" text-anchor="middle" fill="#f57f17" font-size="8" font-weight="600">주의</text>
  </g>

  <!-- 코스4: 말티재 - 오른쪽 아래 방향 -->
  <path d="M455,490 C520,520 580,560 650,600" stroke="#66bb6a" stroke-width="3" stroke-dasharray="8,5" fill="none" opacity="0.7"/>
  <circle cx="520" cy="525" r="5" fill="#66bb6a" opacity="0.4"/>
  <circle cx="575" cy="555" r="4" fill="#66bb6a" opacity="0.3"/>
  <circle cx="620" cy="580" r="5" fill="#66bb6a" opacity="0.4"/>

  <!-- 코스4 라벨 박스 -->
  <g transform="translate(680,625)">
    <rect x="-100" y="-35" width="200" height="80" rx="12" fill="white" filter="url(#ds)" opacity="0.95"/>
    <rect x="-100" y="-35" width="200" height="5" rx="2" fill="#66bb6a"/>
    <circle cx="-75" cy="-8" r="14" fill="#66bb6a"/>
    <text x="-75" y="-3" text-anchor="middle" fill="white" font-size="13" font-weight="700">4</text>
    <text x="-55" y="-12" fill="#1b5e20" font-size="13" font-weight="700">말티재 휴양림</text>
    <text x="-85" y="8" fill="#555" font-size="10">2.5km / 1시간 / 완만</text>
    <text x="-85" y="23" fill="#888" font-size="9">낙엽+흙 숲길 / 피톤치드</text>
    <rect x="62" y="-5" width="30" height="18" rx="9" fill="#e8f5e9"/>
    <text x="77" y="9" text-anchor="middle" fill="#2e7d32" font-size="8" font-weight="600">힐링</text>
  </g>

  <!-- 코스5: 정이품송~비룡저수지 - 아래 중앙 -->
  <path d="M400,530 C400,580 400,640 400,700" stroke="#81c784" stroke-width="3" stroke-dasharray="8,5" fill="none" opacity="0.7"/>
  <circle cx="400" cy="570" r="5" fill="#81c784" opacity="0.4"/>
  <circle cx="400" cy="620" r="4" fill="#81c784" opacity="0.3"/>
  <circle cx="400" cy="670" r="5" fill="#81c784" opacity="0.4"/>

  <!-- 비룡저수지 물 표현 -->
  <ellipse cx="400" cy="760" rx="70" ry="20" fill="#64b5f6" opacity="0.35"/>
  <ellipse cx="400" cy="760" rx="50" ry="12" fill="#90caf9" opacity="0.3"/>

  <!-- 정이품송 소나무 아이콘 -->
  <g transform="translate(340,710)">
    <rect x="-3" y="0" width="6" height="18" fill="#5c3a1e"/>
    <ellipse cx="0" cy="-8" rx="18" ry="16" fill="#2e7d32" opacity="0.7"/>
    <ellipse cx="8" cy="-14" rx="12" ry="10" fill="#388e3c" opacity="0.6"/>
    <text x="0" y="35" text-anchor="middle" fill="#1b5e20" font-size="8">정이품송</text>
  </g>

  <!-- 코스5 라벨 박스 -->
  <g transform="translate(400,790)">
    <rect x="-120" y="-30" width="240" height="75" rx="12" fill="white" filter="url(#ds)" opacity="0.95"/>
    <rect x="-120" y="-30" width="240" height="5" rx="2" fill="#81c784"/>
    <circle cx="-95" cy="0" r="14" fill="#81c784"/>
    <text x="-95" y="5" text-anchor="middle" fill="white" font-size="13" font-weight="700">5</text>
    <text x="-75" y="-8" fill="#1b5e20" font-size="13" font-weight="700">정이품송 ~ 비룡저수지</text>
    <text x="-105" y="12" fill="#555" font-size="10">4.6km / 1시간 / 저지대 평탄 흙길</text>
    <text x="-105" y="27" fill="#888" font-size="9">수평탐방로 / 수월한 난이도</text>
    <rect x="82" y="-5" width="30" height="18" rx="9" fill="#e3f2fd"/>
    <text x="97" y="9" text-anchor="middle" fill="#1565c0" font-size="8" font-weight="600">호수</text>
  </g>

  <!-- ====== 범례 ====== -->
  <g transform="translate(400,895)">
    <rect x="-250" y="-20" width="500" height="42" rx="10" fill="white" opacity="0.85" filter="url(#ds)"/>
    <!-- 전용코스 -->
    <rect x="-230" y="-8" width="12" height="12" rx="3" fill="#e65100"/>
    <text x="-212" y="3" fill="#333" font-size="10">전용코스</text>
    <!-- 흙길 -->
    <rect x="-160" y="-8" width="12" height="12" rx="3" fill="#388e3c"/>
    <text x="-142" y="3" fill="#333" font-size="10">흙길</text>
    <!-- 낙엽길 -->
    <rect x="-100" y="-8" width="12" height="12" rx="3" fill="#66bb6a"/>
    <text x="-82" y="3" fill="#333" font-size="10">낙엽길</text>
    <!-- 후반 흙길 -->
    <rect x="-30" y="-8" width="12" height="12" rx="3" fill="#43a047"/>
    <text x="-12" y="3" fill="#333" font-size="10">후반 흙길</text>
    <!-- 평탄 수평길 -->
    <rect x="60" y="-8" width="12" height="12" rx="3" fill="#81c784"/>
    <text x="78" y="3" fill="#333" font-size="10">평탄 수평길</text>
    <!-- 점선 범례 -->
    <line x1="155" y1="-2" x2="185" y2="-2" stroke="#666" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="192" y="3" fill="#333" font-size="10">도보 경로</text>
  </g>

  <!-- ====== 타이틀 배너 ====== -->
  <rect x="30" y="15" width="740" height="70" rx="14" fill="#1b5e20" opacity="0.9" filter="url(#ds)"/>
  <text x="400" y="45" text-anchor="middle" fill="white" font-size="24" font-weight="700">속리산 포레스트 주변 맨발걷기 지도</text>
  <text x="400" y="68" text-anchor="middle" fill="#a5d6a7" font-size="14">검증 완료 5개 코스 안내</text>

  <!-- ====== 하단 브랜딩 ====== -->
  <rect x="30" y="950" width="740" height="36" rx="10" fill="#1b5e20" opacity="0.85"/>
  <text x="400" y="974" text-anchor="middle" fill="white" font-size="12">2026 대구교회 여름집회  |  맨발걷기 코스 안내  |  신발을 꼭 챙겨가세요!</text>
</svg>